<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة Bazaar للمواد الغذائية - العراق</title>
    <meta name="description" content="منصة B2B لتوزيع المواد الغذائية في العراق">
    <meta name="theme-color" content="#2c5f2d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Bazaar">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/bazaar/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/bazaar/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/bazaar/icons/icon-192x192.png">

    <link rel="stylesheet" href="css/styles.css">

    <style>
        body { -webkit-user-select: none; user-select: none; }
        input, textarea { -webkit-user-select: text; user-select: text; }
        #splash {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #2c5f2d, #4a9e4c);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999; gap: 1rem;
            transition: opacity 0.5s ease;
        }
        #splash.hidden { opacity: 0; pointer-events: none; }
        #splash .logo { font-size: 5rem; }
        #splash .name { color: white; font-size: 2rem; font-weight: bold; font-family: Arial; }
        #splash .sub  { color: rgba(255,255,255,0.8); font-size: 1rem; font-family: Arial; }
        #splash .loader {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 1s linear infinite; margin-top: 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="splash">
        <div class="logo">🛒</div>
        <div class="name">منصة Bazaar</div>
        <div class="sub">للمواد الغذائية - العراق</div>
        <div class="loader"></div>
    </div>

    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/utils.js"></script>
    <script src="js/bazaar-compiled.js"></script>

    <script>
        // إخفاء Splash بعد التحميل
        window.addEventListener('load', () => {
            setTimeout(() => {
                const s = document.getElementById('splash');
                if (s) { s.classList.add('hidden'); setTimeout(() => s.remove(), 500); }
            }, 1500);
        });

        // ✅ تسجيل Service Worker - المسار الصحيح لـ GitHub Pages
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker
                    .register('/bazaar/sw.js', { scope: '/bazaar/' })
                    .then(reg => console.log('✅ SW registered:', reg.scope))
                    .catch(err => console.error('❌ SW error:', err));
            });
        }
    </script>
</body>
</html>
